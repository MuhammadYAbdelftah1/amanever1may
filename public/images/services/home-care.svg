<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f0f7f7"/>
  <g transform="translate(400, 300)">
    <!-- House -->
    <path d="M -100 0 L 0 -80 L 100 0 L 100 80 L -100 80 Z" fill="#5e8f8f" opacity="0.2"/>
    <rect x="-80" y="0" width="160" height="80" fill="white"/>
    
    <!-- Door -->
    <rect x="-20" y="20" width="40" height="60" rx="5" fill="#5e8f8f" opacity="0.3"/>
    
    <!-- Medical Cross -->
    <g transform="translate(50, -30)">
      <rect x="-5" y="-15" width="10" height="30" fill="#5e8f8f"/>
      <rect x="-15" y="-5" width="30" height="10" fill="#5e8f8f"/>
    </g>
  </g>
  <text x="400" y="500" font-family="Arial, sans-serif" font-size="32" fill="#5e8f8f" text-anchor="middle" font-weight="bold">Home Services</text>
  <text x="400" y="540" font-family="Arial, sans-serif" font-size="18" fill="#4a7373" text-anchor="middle">Healthcare at Your Residence</text>
</svg>
